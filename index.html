<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三棱锥 - 战略价值矩阵</title>
  <link rel="stylesheet" href="css/main.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/FXAAShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="control-panel">
    <section class="panel-section is-open" data-section="color">
      <button type="button" class="panel-section-header" aria-expanded="true">
        <span class="panel-section-title">颜色与亮度</span>
        <span class="panel-section-chevron" aria-hidden="true"></span>
      </button>
      <div class="panel-section-body">
        <div class="ctrl-row">
          <div class="ctrl-label">
            <span>主色调</span>
            <span id="color-hex-label">#DDB873</span>
          </div>
          <div class="color-row">
            <input id="pyramid-color-picker" type="color" value="#DDB873">
            <div id="color-preview" style="background: #DDB873"></div>
          </div>
        </div>
        <div class="ctrl-row">
          <div class="ctrl-label">
            <span>整体亮度</span>
            <span id="brightness-val">67%</span>
          </div>
          <input id="brightness-slider" class="panel-slider" type="range" min="10" max="150" value="67">
        </div>
      </div>
    </section>

    <section class="panel-section is-open" data-section="edge-flow">
      <button type="button" class="panel-section-header" aria-expanded="true">
        <span class="panel-section-title">棱边流光</span>
        <span class="panel-section-chevron" aria-hidden="true"></span>
      </button>
      <div class="panel-section-body">
        <div class="ctrl-row">
          <div class="ctrl-label">
            <span>上升速度</span>
            <span id="edge-flow-speed-val">32%</span>
          </div>
          <input id="edge-flow-speed-slider" class="panel-slider" type="range" min="5" max="100" value="32">
        </div>
        <div class="ctrl-row">
          <div class="ctrl-label">
            <span>流光亮度</span>
            <span id="edge-flow-intensity-val">100%</span>
          </div>
          <input id="edge-flow-intensity-slider" class="panel-slider" type="range" min="10" max="200" value="100">
        </div>
        <div class="ctrl-row">
          <div class="ctrl-label">
            <span>透明度</span>
            <span id="edge-flow-opacity-val">95%</span>
          </div>
          <input id="edge-flow-opacity-slider" class="panel-slider" type="range" min="0" max="100" value="95">
        </div>
        <div class="ctrl-row">
          <div class="ctrl-label">
            <span>光带宽度</span>
            <span id="edge-flow-band-width-val">12%</span>
          </div>
          <input id="edge-flow-band-width-slider" class="panel-slider" type="range" min="5" max="25" value="12">
        </div>
        <div class="ctrl-row">
          <div class="ctrl-label">
            <span>外层管宽</span>
            <span id="edge-flow-outer-radius-val">0.024</span>
          </div>
          <input id="edge-flow-outer-radius-slider" class="panel-slider" type="range" min="10" max="80" value="24">
        </div>
        <div class="ctrl-row">
          <div class="ctrl-label">
            <span>内层核心</span>
            <span id="edge-flow-inner-radius-val">0.005</span>
          </div>
          <input id="edge-flow-inner-radius-slider" class="panel-slider" type="range" min="3" max="40" value="5">
        </div>
      </div>
    </section>

    <section class="panel-section" data-section="axis">
      <button type="button" class="panel-section-header" aria-expanded="false">
        <span class="panel-section-title">中轴柱子</span>
        <span class="panel-section-chevron" aria-hidden="true"></span>
      </button>
      <div class="panel-section-body">
        <div class="ctrl-row">
          <div class="ctrl-label">
            <span>柱子颜色</span>
            <span id="axis-color-hex-label">#DDB873</span>
          </div>
          <div class="color-row">
            <input id="axis-color-picker" type="color" value="#DDB873">
            <div id="axis-color-preview" style="background: #DDB873"></div>
          </div>
        </div>
        <div class="ctrl-row">
          <div class="ctrl-label">
            <span>颜色亮度</span>
            <span id="axis-color-brightness-val">112%</span>
          </div>
          <input id="axis-color-brightness-slider" class="panel-slider" type="range" min="50" max="200" value="112">
        </div>
        <div class="ctrl-row">
          <div class="ctrl-label">
            <span>金属度</span>
            <span id="axis-metalness-val">45%</span>
          </div>
          <input id="axis-metalness-slider" class="panel-slider" type="range" min="0" max="100" value="45">
        </div>
        <div class="ctrl-row">
          <div class="ctrl-label">
            <span>粗糙度</span>
            <span id="axis-roughness-val">10%</span>
          </div>
          <input id="axis-roughness-slider" class="panel-slider" type="range" min="0" max="100" value="10">
        </div>
        <div class="ctrl-row">
          <div class="ctrl-label">
            <span>自发光强度</span>
            <span id="axis-emissive-val">44%</span>
          </div>
          <input id="axis-emissive-slider" class="panel-slider" type="range" min="0" max="300" value="44">
        </div>
        <div class="ctrl-row">
          <div class="ctrl-label">
            <span>清漆层</span>
            <span id="axis-clearcoat-val">90%</span>
          </div>
          <input id="axis-clearcoat-slider" class="panel-slider" type="range" min="0" max="100" value="90">
        </div>
        <div class="ctrl-row">
          <div class="ctrl-label">
            <span>柱内光源</span>
            <span id="axis-light-val">280%</span>
          </div>
          <input id="axis-light-slider" class="panel-slider" type="range" min="0" max="500" value="280">
        </div>
      </div>
    </section>

    <section class="panel-section" data-section="slice">
      <button type="button" class="panel-section-header" aria-expanded="false">
        <span class="panel-section-title">切片渐变</span>
        <span class="panel-section-chevron" aria-hidden="true"></span>
      </button>
      <div class="panel-section-body">
        <div class="slice-section slice-opacity-global">
          <div class="slice-title">面片透明度</div>
          <div class="ctrl-row">
            <div class="ctrl-label">
              <span>中心透明度</span>
              <span id="slice-opacity-center-val">25%</span>
            </div>
            <input id="slice-opacity-center-slider" class="panel-slider" type="range" min="0" max="100" value="25">
          </div>
          <div class="ctrl-row">
            <div class="ctrl-label">
              <span>边缘透明度</span>
              <span id="slice-opacity-edge-val">95%</span>
            </div>
            <input id="slice-opacity-edge-slider" class="panel-slider" type="range" min="0" max="100" value="95">
          </div>
          <div class="ctrl-row">
            <div class="ctrl-label">
              <span>过渡范围</span>
              <span id="slice-fade-range-val">100%</span>
            </div>
            <input id="slice-fade-range-slider" class="panel-slider" type="range" min="5" max="100" value="100">
          </div>
        </div>
        <div class="slice-section" data-slice="0">
          <div class="slice-title">第一层 (1/3 高度)</div>
          <div class="gradient-row">
            <label>中心</label>
            <input class="slice-color-picker" type="color" data-slice="0" data-role="start" value="#383838">
            <div class="gradient-preview" data-slice="0"></div>
          </div>
          <div class="gradient-row">
            <label>边缘</label>
            <input class="slice-color-picker" type="color" data-slice="0" data-role="end" value="#C2B85B">
          </div>
        </div>
        <div class="slice-section" data-slice="1">
          <div class="slice-title">第二层 (2/3 高度)</div>
          <div class="gradient-row">
            <label>中心</label>
            <input class="slice-color-picker" type="color" data-slice="1" data-role="start" value="#323232">
            <div class="gradient-preview" data-slice="1"></div>
          </div>
          <div class="gradient-row">
            <label>边缘</label>
            <input class="slice-color-picker" type="color" data-slice="1" data-role="end" value="#C2B85B">
          </div>
        </div>
      </div>
    </section>
  </div>
  <div id="effect-panel">
    <h2>三棱锥效果</h2>
    <div class="effect-btn-group">
      <button type="button" id="effect-glow-btn" class="effect-btn active" data-effect="glow">发光效果</button>
      <button type="button" id="effect-wireframe-btn" class="effect-btn" data-effect="wireframe">线框效果</button>
      <button type="button" id="effect-particles-btn" class="effect-btn" data-effect="particles">粒子效果</button>
      <button type="button" id="effect-glow-wire-toggle-btn" class="effect-btn effect-btn-transition">发光 → 线框 柔和切换</button>
      <button type="button" id="effect-wire-particle-toggle-btn" class="effect-btn effect-btn-transition">线框 → 粒子 柔和切换</button>
      <button type="button" id="effect-particle-glow-toggle-btn" class="effect-btn effect-btn-transition">粒子 → 发光 柔和切换</button>
    </div>
  </div>
  <script type="module" src="js/app/main.js"></script>
</body>
</html>
